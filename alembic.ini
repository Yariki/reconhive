[alembic]
script_location = migrations
sqlalchemy.url = postgresql+asyncpg://reconhive:reconhive@localhost:5432/reconhive

[loggers]
keys = root
[handlers]
keys = console
[formatters]
keys = generic
[logger_root]
level = WARN
handlers = console
[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
