services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: reconhive
      POSTGRES_PASSWORD: reconhive
      POSTGRES_DB: reconhive
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reconhive"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports: ["8000:8000"]
    environment:
      RECONHIVE_DATABASE_URL: postgresql+asyncpg://reconhive:reconhive@db:5432/reconhive
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    environment:
      VITE_API_BASE: http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:
